<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SENTRY FAHIM | Abdullah Al Fahim</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --accent2: #818cf8;
            --danger: #ff3366;
            --warning: #f7b731;
            --safe: #20bf6b;
            --bg: #020617;
            --bg2: #050d1f;
            --card: rgba(15, 23, 42, 0.85);
            --card2: rgba(20, 30, 55, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(99, 102, 241, 0.2);
            --text: #f8fafc;
            --text2: #94a3b8;
            --glass: rgba(99, 102, 241, 0.05);
        }
        body.light-mode {
            --bg: #eef2ff; --bg2: #e0e7ff;
            --card: rgba(255, 255, 255, 0.9); --card2: rgba(238, 242, 255, 0.95);
            --border: rgba(0, 0, 0, 0.08); --border2: rgba(99, 102, 241, 0.3);
            --text: #1e1b4b; --text2: #4338ca;
            --glass: rgba(99, 102, 241, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s, color 0.4s;
        }

        /* ── Noise Overlay ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.5;
        }

        /* ── Map ── */
        #map {
            height: 100vh; width: 100%;
            position: absolute; z-index: 1;
            filter: contrast(1.1) brightness(0.75) saturate(1.3);
            transition: filter 0.4s;
        }
        body.light-mode #map { filter: brightness(0.95) saturate(1.1); }

        /* ── TOP HUD ── */
        .hud-top {
            position: fixed; top: env(safe-area-inset-top, 16px); left: 50%;
            transform: translateX(-50%); width: 94%; max-width: 600px;
            z-index: 2000; padding: 14px 18px; border-radius: 22px;
            backdrop-filter: blur(24px) saturate(1.8);
            background: var(--card);
            border: 1px solid var(--border2);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.1);
        }

        .brand-block { display: flex; align-items: center; gap: 10px; }
        .brand-pulse {
            width: 8px; height: 8px; background: var(--safe);
            border-radius: 50%; box-shadow: 0 0 10px var(--safe);
            animation: livePulse 2s ease-in-out infinite;
        }
        @keyframes livePulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:0.6} }

        .os-logo {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            font-size: 11px; letter-spacing: 3px; color: var(--accent);
        }
        
        .hud-controls { display: flex; align-items: center; gap: 10px; }
        .hud-btn {
            background: var(--glass); border: 1px solid var(--border2);
            color: var(--text); width: 36px; height: 36px; border-radius: 12px;
            cursor: pointer; font-size: 14px; display: flex; align-items: center;
            justify-content: center; transition: 0.2s; backdrop-filter: blur(10px);
        }
        .hud-btn:active { transform: scale(0.9); }
        .hud-btn.active { background: rgba(99,102,241,0.3); border-color: var(--accent); }

        .sync-info {
            font-family: 'Space Mono', monospace; font-size: 9px;
            color: var(--safe); letter-spacing: 1px; text-align: right;
        }

        /* ── STATS ROW ── */
        .stats-row {
            position: fixed; top: calc(env(safe-area-inset-top, 16px) + 74px);
            left: 50%; transform: translateX(-50%); width: 94%; max-width: 600px;
            z-index: 1999; display: flex; gap: 8px;
        }
        .stat-chip {
            flex: 1; padding: 10px 12px; border-radius: 16px;
            backdrop-filter: blur(20px); background: var(--card);
            border: 1px solid var(--border); text-align: center;
            transition: 0.3s; cursor: default;
        }
        .stat-chip:hover { border-color: var(--border2); transform: translateY(-1px); }
        .stat-val {
            font-family: 'Space Mono', monospace; font-size: 18px;
            font-weight: 700; color: var(--accent); line-height: 1;
        }
        .stat-lbl { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; opacity: 0.45; margin-top: 3px; text-transform: uppercase; }

        /* ── SEISMOGRAPH ── */
        .seismo-container {
            position: fixed; bottom: calc(92vh - 20px); left: 50%;
            transform: translateX(-50%); width: 94%; max-width: 600px;
            z-index: 1998; opacity: 0.7;
        }
        #seismoCanvas { width: 100%; height: 40px; border-radius: 10px; }

        /* ── SHUTTER PANEL ── */
        .shutter-panel {
            position: fixed; bottom: 0; left: 0; right: 0; height: 92vh;
            background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
            backdrop-filter: blur(40px) saturate(2);
            border-radius: 36px 36px 0 0; z-index: 1500;
            border-top: 1px solid var(--border2);
            transform: translateY(80vh);
            transition: transform 0.65s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 -20px 80px rgba(0,0,0,0.5);
        }
        .shutter-panel.open { transform: translateY(8vh); }

        .drag-zone {
            width: 100%; padding: 20px 0 10px;
            display: flex; flex-direction: column; align-items: center; cursor: grab;
            user-select: none;
        }
        .drag-bar {
            width: 40px; height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 10px; opacity: 0.4;
        }
        .panel-title {
            font-family: 'Syncopate', monospace; font-size: 9px;
            letter-spacing: 4px; opacity: 0.3; margin-top: 8px; color: var(--text);
        }

        .content-scroll {
            padding: 0 20px 120px; overflow-y: auto; height: calc(100% - 70px);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .content-scroll::-webkit-scrollbar { display: none; }

        /* ── FILTER BAR ── */
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 18px;
            flex-wrap: wrap; align-items: center;
        }
        .filter-label { font-size: 11px; font-weight: 700; opacity: 0.5; white-space: nowrap; }
        .mag-filter-btn {
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: transparent; color: var(--text); font-size: 11px; font-weight: 700;
            cursor: pointer; transition: 0.2s; font-family: 'Space Mono', monospace;
        }
        .mag-filter-btn.active {
            background: var(--accent); border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(99,102,241,0.4);
        }

        /* ── TABS ── */
        .tab-container {
            display: flex; gap: 6px; margin-bottom: 20px;
            background: var(--glass); padding: 6px; border-radius: 18px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text);
            padding: 10px 0; border-radius: 12px; opacity: 0.4;
            font-family: 'Syncopate', sans-serif; font-size: 8px; letter-spacing: 2px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active {
            opacity: 1; background: var(--accent);
            box-shadow: 0 4px 16px rgba(99,102,241,0.4);
        }

        /* ── EVENT CARDS ── */
        .event-card {
            background: var(--card2); border: 1px solid var(--border);
            padding: 18px; border-radius: 24px; margin-bottom: 12px;
            display: flex; gap: 16px; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden; cursor: pointer;
            animation: cardIn 0.4s ease forwards;
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        
        .event-card::before {
            content: ''; position: absolute; inset: 0; opacity: 0;
            background: radial-gradient(circle at 30% 50%, rgba(99,102,241,0.12), transparent 70%);
            transition: 0.4s;
        }
        .event-card:active { transform: scale(0.975); }
        .event-card:active::before { opacity: 1; }

        .event-card .accent-bar {
            position: absolute; left: 0; top: 20%; height: 60%;
            width: 3px; border-radius: 0 4px 4px 0;
            background: var(--accent); opacity: 0;
            transition: 0.3s; transform: scaleY(0);
        }
        .event-card:active .accent-bar { opacity: 1; transform: scaleY(1); }

        .mag-orbit {
            min-width: 64px; height: 64px; border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); border: 2px solid var(--accent);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.15); flex-shrink: 0;
            transition: 0.3s;
        }
        .event-card:active .mag-orbit { box-shadow: 0 0 28px rgba(99, 102, 241, 0.4); }
        .mag-val { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
        .mag-unit { font-size: 7px; font-weight: 800; opacity: 0.5; margin-top: 1px; letter-spacing: 2px; }

        .event-info { flex: 1; min-width: 0; }
        .event-place { font-weight: 800; font-size: 14px; letter-spacing: -0.3px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-meta { display: flex; gap: 12px; margin-top: 5px; }
        .event-time { font-size: 11px; color: var(--text2); font-family: 'Space Mono', monospace; }
        .event-depth { font-size: 11px; color: var(--warning); font-family: 'Space Mono', monospace; }

        .zone-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .zone-pill {
            font-size: 9px; font-weight: 800; padding: 5px 10px; border-radius: 10px;
            background: var(--glass); border: 1px solid var(--border);
            display: flex; align-items: center; gap: 4px; letter-spacing: 0.5px;
            font-family: 'Space Mono', monospace;
        }
        .zone-pill.felt { border-color: rgba(32,191,107,0.3); background: rgba(32,191,107,0.08); }

        /* ── MASTER ALERT ── */
        .master-alert {
            position: fixed; top: -180px; left: 50%; transform: translateX(-50%); width: 92%;
            max-width: 560px; padding: 20px 24px; border-radius: 26px; z-index: 5000;
            background: rgba(10, 5, 15, 0.95); backdrop-filter: blur(30px);
            border: 1.5px solid var(--danger);
            transition: top 0.7s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; gap: 18px;
            box-shadow: 0 0 60px rgba(255, 51, 102, 0.2);
        }
        .master-alert.active { top: calc(env(safe-area-inset-top, 20px) + 155px); }
        
        .alert-icon { font-size: 36px; animation: alertShake 0.5s ease infinite alternate; flex-shrink: 0; }
        @keyframes alertShake { 0%{transform:rotate(-5deg)} 100%{transform:rotate(5deg)} }
        
        .alert-body { flex: 1; min-width: 0; }
        .alert-title { font-family: 'Syncopate', sans-serif; color: var(--danger); font-size: 11px; font-weight: 700; letter-spacing: 3px; }
        .alert-text { font-size: 12px; opacity: 0.75; margin-top: 4px; line-height: 1.5; }

        /* ── IDENTITY ── */
        .identity {
            text-align: center; margin-bottom: 24px; padding: 24px;
            background: var(--glass); border-radius: 24px; border: 1px solid var(--border2);
        }
        .identity-label { font-size: 8px; letter-spacing: 5px; opacity: 0.35; text-transform: uppercase; margin-bottom: 8px; }
        .identity-name {
            font-family: 'Syncopate', sans-serif; font-size: 16px;
            font-weight: 700; color: var(--accent);
            text-shadow: 0 0 30px rgba(99,102,241,0.5);
        }
        body.light-mode .identity-name { text-shadow: none; }
        .identity-desc { font-size: 11px; opacity: 0.4; margin-top: 6px; letter-spacing: 1px; }

        /* ── BOOT BUTTON ── */
        .action-node {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white; border: none; padding: 18px; border-radius: 20px;
            font-weight: 800; width: 100%; margin-bottom: 20px; cursor: pointer;
            letter-spacing: 2px; font-family: 'Syncopate', sans-serif; font-size: 10px;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .action-node::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            border-radius: inherit;
        }
        .action-node:active { transform: scale(0.97); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center; padding: 60px 20px; opacity: 0.4;
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-text { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2px; }

        /* ── PROGRESS ── */
        .sync-bar {
            position: absolute; top: 0; left: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            width: 0%; transition: width 1s linear; border-radius: 0 2px 2px 0;
        }

        /* ── LOCATION BANNER ── */
        .loc-banner {
            padding: 12px 16px; border-radius: 16px; margin-bottom: 14px;
            background: rgba(32,191,107,0.08); border: 1px solid rgba(32,191,107,0.2);
            font-size: 12px; display: flex; align-items: center; gap: 10px;
            display: none;
        }
        .loc-banner.visible { display: flex; }

        /* ── SOUND WAVE (decorative) ── */
        .wave-bars {
            display: flex; gap: 2px; align-items: center; height: 16px;
        }
        .wave-bar {
            width: 2px; border-radius: 2px; background: var(--safe);
            animation: waveDance 1s ease-in-out infinite;
        }
        .wave-bar:nth-child(1){height:6px;animation-delay:0s}
        .wave-bar:nth-child(2){height:12px;animation-delay:0.15s}
        .wave-bar:nth-child(3){height:8px;animation-delay:0.3s}
        .wave-bar:nth-child(4){height:14px;animation-delay:0.45s}
        .wave-bar:nth-child(5){height:6px;animation-delay:0.6s}
        @keyframes waveDance { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.3)} }

        /* ── CUSTOM SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

        /* ── TOOLTIP ── */
        .leaflet-tooltip {
            background: var(--card2); border: 1px solid var(--border2);
            color: var(--text); font-family: 'Space Mono', monospace;
            font-size: 11px; border-radius: 10px; padding: 8px 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        /* ── DEPTH BADGE ── */
        .depth-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 9px; font-family: 'Space Mono', monospace;
            padding: 3px 8px; border-radius: 8px;
            background: rgba(247,183,49,0.1); border: 1px solid rgba(247,183,49,0.25);
            color: var(--warning); font-weight: 700; letter-spacing: 0.5px;
        }

        /* ── FELT RANGE ── */
        .felt-range {
            margin-top: 10px; padding: 10px 14px; border-radius: 14px;
            background: rgba(32,191,107,0.06); border: 1px solid rgba(32,191,107,0.15);
            font-size: 11px;
        }
        .felt-range-title { font-size: 8px; letter-spacing: 2px; opacity: 0.5; margin-bottom: 4px; font-weight: 700; }

        /* ── CUSTOM MARKER ── */
        .custom-dot {
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 10px currentColor;
            animation: markerPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes markerPop { from{transform:scale(0)} to{transform:scale(1)} }

        @keyframes pulse {
            0%,100%{transform:scale(1);opacity:1}
            50%{transform:scale(1.5);opacity:0.6}
        }

        /* ── MAGNITUDE COLORS ── */
        .mc-minor { color: #94a3b8; border-color: #94a3b8 !important; box-shadow: 0 0 12px rgba(148,163,184,0.2) !important; }
        .mc-light { color: #60a5fa; border-color: #60a5fa !important; box-shadow: 0 0 12px rgba(96,165,250,0.2) !important; }
        .mc-moderate { color: var(--warning); border-color: var(--warning) !important; box-shadow: 0 0 12px rgba(247,183,49,0.2) !important; }
        .mc-strong { color: #f97316; border-color: #f97316 !important; box-shadow: 0 0 12px rgba(249,115,22,0.25) !important; }
        .mc-major { color: var(--danger); border-color: var(--danger) !important; box-shadow: 0 0 20px rgba(255,51,102,0.35) !important; }

        /* ── SECTION LABEL ── */
        .section-label {
            font-family: 'Syncopate', sans-serif; font-size: 8px;
            letter-spacing: 3px; opacity: 0.35; text-transform: uppercase;
            margin-bottom: 12px; padding-left: 4px;
        }

        /* SHAKE ALERT on major events */
        @keyframes screenShake {
            0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)}
        }
        body.shaking { animation: screenShake 0.5s ease; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- MASTER ALERT -->
<div class="master-alert" id="alert-pop">
    <div class="alert-icon">🛑</div>
    <div class="alert-body">
        <div class="alert-title">SEISMIC BREACH DETECTED</div>
        <div id="alert-info" class="alert-text">Loading threat data...</div>
    </div>
    <button onclick="document.getElementById('alert-pop').classList.remove('active')"
        style="background:none;border:none;color:var(--text);opacity:0.4;cursor:pointer;font-size:18px;padding:4px;">✕</button>
</div>

<!-- TOP HUD -->
<div class="hud-top">
    <div class="brand-block">
        <div class="brand-pulse" id="liveDot"></div>
        <div class="os-logo">SENTRY FAHIM</div>
    </div>
    <div class="hud-controls">
        <div class="wave-bars" id="waveAnim" style="display:none;">
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="sync-info">
            <div id="timer">SYNC: 10S</div>
        </div>
        <button class="hud-btn" id="soundBtn" onclick="toggleSound()" title="Sound">🔔</button>
        <button class="hud-btn" id="locBtn" onclick="findMyLocation()" title="My Location">📍</button>
        <button class="hud-btn" onclick="toggleMode()" title="Theme">🌓</button>
    </div>
</div>

<!-- STATS ROW -->
<div class="stats-row" id="statsRow">
    <div class="stat-chip">
        <div class="stat-val" id="statCount">—</div>
        <div class="stat-lbl">Events</div>
    </div>
    <div class="stat-chip">
        <div class="stat-val" id="statMax" style="color:var(--danger)">—</div>
        <div class="stat-lbl">Max Mag</div>
    </div>
    <div class="stat-chip">
        <div class="stat-val" id="statAvg" style="color:var(--warning)">—</div>
        <div class="stat-lbl">Avg Mag</div>
    </div>
    <div class="stat-chip">
        <div class="stat-val" id="statDepth" style="color:var(--safe)">—</div>
        <div class="stat-lbl">Avg Depth</div>
    </div>
</div>

<!-- SHUTTER PANEL -->
<div class="shutter-panel" id="sheet">
    <div class="sync-bar" id="progress"></div>
    <div class="drag-zone" id="handle">
        <div class="drag-bar"></div>
        <div class="panel-title">EARTHQUAKE DATA</div>
    </div>
    
    <div class="content-scroll">

        <div class="identity">
            <div class="identity-label">Architected By</div>
            <div class="identity-name">ABDULLAH AL FAHIM</div>
            <div class="identity-desc">Real-time South Asian Seismic Intelligence</div>
        </div>

        <button onclick="unlockSystem()" id="boot" class="action-node">⚡ ENABLE SENSOR INTERFACE</button>

        <!-- Location Banner -->
        <div class="loc-banner" id="locBanner">
            <span>📍</span>
            <div>
                <div style="font-weight:700;font-size:12px;">আপনার অবস্থান শনাক্ত হয়েছে</div>
                <div id="nearestEq" style="font-size:11px;opacity:0.6;margin-top:2px;">নিকটতম ভূমিকম্প খুঁজছি...</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('live', event)">LIVE 24H</button>
            <button class="tab-btn" onclick="switchTab('past', event)">PAST 30D</button>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
            <div class="filter-label">MAG ≥</div>
            <button class="mag-filter-btn active" onclick="setMagFilter(0, this)">ALL</button>
            <button class="mag-filter-btn" onclick="setMagFilter(2.5, this)">2.5+</button>
            <button class="mag-filter-btn" onclick="setMagFilter(4, this)">4.0+</button>
            <button class="mag-filter-btn" onclick="setMagFilter(5, this)">5.0+</button>
        </div>

        <div class="section-label" id="dataLabel">RECENT SEISMIC EVENTS</div>
        <div id="live-stream"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────
const state = {
    isLive: false,
    currentTab: 'live',
    magFilter: 0,
    allData: [],
    lastId: null,
    timeLeft: 10,
    soundEnabled: true,
    userLat: null,
    userLon: null,
    lightMode: false
};

// ── MAP INIT ───────────────────────────────────────────
const map = L.map('map', { zoomControl: false, attributionControl: false })
    .setView([23.8, 90.3], 6);

const layerGroup = L.layerGroup().addTo(map);
const faultGroup = L.layerGroup().addTo(map);
const userGroup  = L.layerGroup().addTo(map);

const darkTile  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
const lightTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
darkTile.addTo(map);

// ── FAULT LINES ────────────────────────────────────────
const faults = [
    { name: 'Dauki Fault',          path: [[25.10,90.00],[25.15,91.50],[25.10,92.50]], danger: 9.5, desc: 'Most dangerous fault in BD' },
    { name: 'Madhupur Fault',       path: [[23.70,90.00],[24.10,90.10],[24.60,90.25]], danger: 7.5, desc: 'Under Dhaka region' },
    { name: 'Sylhet Fault',         path: [[24.50,91.30],[24.80,91.80],[25.10,92.00]], danger: 8.0, desc: 'NE Bangladesh' },
    { name: 'Arakan-Yoma Fold Belt',path: [[20.00,92.30],[21.50,93.00],[23.00,93.80],[24.50,94.50]], danger: 9.0, desc: 'Myanmar border' },
    { name: 'Plate Boundary',       path: [[20.00,91.00],[22.00,92.00],[25.00,93.00],[27.00,95.00]], danger: 10,  desc: 'Indian-Eurasian boundary' }
];

function addFaultLines() {
    faultGroup.clearLayers();
    faults.forEach(f => {
        // Glow
        L.polyline(f.path, {
            color: f.danger > 9 ? '#ff0000' : '#ff9900',
            weight: f.danger * 2, opacity: 0.08, smoothFactor: 2
        }).addTo(faultGroup);
        // Line
        const line = L.polyline(f.path, {
            color: f.danger > 9 ? '#ff5555' : '#ffcc00',
            weight: f.danger > 8 ? 2.5 : 1.5,
            opacity: 0.75,
            dashArray: f.danger > 8 ? null : '6, 6'
        }).addTo(faultGroup);
        line.bindTooltip(`<b>${f.name}</b><br>${f.desc}`, { sticky: true, offset: [0, -8] });
    });
}
addFaultLines();

// ── MAG COLOR LOGIC ────────────────────────────────────
function magClass(mag) {
    if (mag < 2.5) return { cls: 'mc-minor', color: '#94a3b8', label: 'MINOR' };
    if (mag < 4.0) return { cls: 'mc-light',  color: '#60a5fa', label: 'LIGHT' };
    if (mag < 5.0) return { cls: 'mc-moderate', color: '#f7b731', label: 'MODERATE' };
    if (mag < 6.0) return { cls: 'mc-strong', color: '#f97316', label: 'STRONG' };
    return { cls: 'mc-major', color: '#ff3366', label: 'MAJOR' };
}

function calcImpact(mag) {
    const base = Math.pow(10, (0.5 * mag - 1.25)) * 14000;
    return { red: base, yellow: base * 2.8, green: base * 6 };
}

// ── SEISMOGRAPH CANVAS ─────────────────────────────────
const seismoCanvas = document.createElement('canvas');
seismoCanvas.id = 'seismoCanvas';
seismoCanvas.style.cssText = 'position:fixed;bottom:8vh;left:50%;transform:translateX(-50%);width:94%;max-width:600px;height:40px;z-index:1499;opacity:0.5;pointer-events:none;';
document.body.appendChild(seismoCanvas);

const ctx = seismoCanvas.getContext('2d');
let seismoData = Array(300).fill(0);
let seismoOffset = 0;

function drawSeismo() {
    const W = seismoCanvas.offsetWidth;
    const H = seismoCanvas.offsetHeight;
    seismoCanvas.width = W;
    seismoCanvas.height = H;
    ctx.clearRect(0, 0, W, H);

    // Ambient noise
    seismoData.push((Math.random() - 0.5) * 3 + Math.sin(Date.now() / 400) * 2);
    if (seismoData.length > W) seismoData.shift();

    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.1, '#6366f1');
    grad.addColorStop(0.9, '#6366f1');
    grad.addColorStop(1, 'transparent');

    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#6366f1';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    seismoData.forEach((v, i) => {
        const x = (i / seismoData.length) * W;
        const y = H / 2 + v * (H / 6);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    requestAnimationFrame(drawSeismo);
}
drawSeismo();

function spikeSeismo(mag) {
    const spike = Array(20).fill(0).map((_,i) => Math.sin(i * 0.8) * mag * 5);
    seismoData.push(...spike);
}

// ── THEME ──────────────────────────────────────────────
function toggleMode() {
    state.lightMode = !state.lightMode;
    document.body.classList.toggle('light-mode');
    if (state.lightMode) {
        map.removeLayer(darkTile); lightTile.addTo(map);
    } else {
        map.removeLayer(lightTile); darkTile.addTo(map);
    }
}

// ── SOUND ──────────────────────────────────────────────
const siren = new Audio('https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg');
siren.volume = 0.4;

function toggleSound() {
    state.soundEnabled = !state.soundEnabled;
    const btn = document.getElementById('soundBtn');
    btn.textContent = state.soundEnabled ? '🔔' : '🔕';
    btn.classList.toggle('active', !state.soundEnabled);
}

// ── UNLOCK ─────────────────────────────────────────────
function unlockSystem() {
    state.isLive = true;
    document.getElementById('boot').style.display = 'none';
    document.getElementById('waveAnim').style.display = 'flex';
    siren.play().then(() => siren.pause()).catch(() => {});
    if (Notification.permission !== 'granted') Notification.requestPermission();
}

// ── LOCATION ───────────────────────────────────────────
function findMyLocation() {
    const btn = document.getElementById('locBtn');
    btn.textContent = '⏳';
    navigator.geolocation.getCurrentPosition(pos => {
        state.userLat = pos.coords.latitude;
        state.userLon = pos.coords.longitude;
        btn.textContent = '✅';
        document.getElementById('locBanner').classList.add('visible');
        userGroup.clearLayers();
        L.circleMarker([state.userLat, state.userLon], {
            radius: 10, color: '#20bf6b', fillColor: '#20bf6b', fillOpacity: 0.8, weight: 3
        }).bindTooltip('📍 আপনার অবস্থান').addTo(userGroup);
        map.flyTo([state.userLat, state.userLon], 8, { duration: 1.5 });
        updateNearestEq();
    }, () => { btn.textContent = '📍'; });
}

function distKm(lat1, lon1, lat2, lon2) {
    const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateNearestEq() {
    if (!state.userLat || !state.allData.length) return;
    let nearest = null, minDist = Infinity;
    state.allData.forEach(f => {
        const [lon, lat] = f.geometry.coordinates;
        const d = distKm(state.userLat, state.userLon, lat, lon);
        if (d < minDist) { minDist = d; nearest = f; }
    });
    if (nearest) {
        const { mag, place } = nearest.properties;
        document.getElementById('nearestEq').textContent =
            `নিকটতম: ${mag.toFixed(1)} Mag • ${Math.round(minDist)} কিমি দূরে`;
    }
}

// ── TABS & FILTER ──────────────────────────────────────
function switchTab(tab, e) {
    state.currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (e) e.target.classList.add('active');
    document.getElementById('dataLabel').textContent =
        tab === 'live' ? 'LAST 24 HOURS' : 'PAST 30 DAYS';
    renderData();
}

function setMagFilter(val, btn) {
    state.magFilter = val;
    document.querySelectorAll('.mag-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderData();
}

// ── ALERT ──────────────────────────────────────────────
function pushAlert(mag, place) {
    const pop = document.getElementById('alert-pop');
    const mc  = magClass(mag);
    document.getElementById('alert-info').innerHTML =
        `<span style="color:${mc.color};font-weight:800;">${mag.toFixed(1)} ${mc.label}</span> — ${place}`;
    pop.classList.add('active');

    if (state.isLive && state.soundEnabled && mag >= 3.0) {
        siren.currentTime = 0;
        siren.play().catch(()=>{});
    }
    if (navigator.vibrate && mag >= 3.0) navigator.vibrate([500, 200, 500, 200, 1000]);

    if (Notification.permission === 'granted') {
        new Notification('⚠️ ভূমিকম্প সতর্কতা!', {
            body: `${mag} মাত্রার ভূমিকম্প — ${place}`,
            icon: 'https://cdn-icons-png.flaticon.com/512/3588/3588523.png'
        });
    }
    if (mag >= 5.0) {
        document.body.classList.add('shaking');
        spikeSeismo(mag);
        setTimeout(() => document.body.classList.remove('shaking'), 600);
    }
    setTimeout(() => pop.classList.remove('active'), 9000);
}

// ── UPDATE STATS ───────────────────────────────────────
function updateStats(data) {
    if (!data.length) {
        ['statCount','statMax','statAvg','statDepth'].forEach(id => document.getElementById(id).textContent = '—');
        return;
    }
    const mags   = data.map(f => f.properties.mag).filter(Boolean);
    const depths = data.map(f => f.geometry.coordinates[2]).filter(Boolean);
    document.getElementById('statCount').textContent = data.length;
    document.getElementById('statMax').textContent   = Math.max(...mags).toFixed(1);
    document.getElementById('statAvg').textContent   = (mags.reduce((a,b)=>a+b,0)/mags.length).toFixed(1);
    document.getElementById('statDepth').textContent = Math.round(depths.reduce((a,b)=>a+b,0)/depths.length)+'km';
}

// ── TIME FORMAT ────────────────────────────────────────
function timeAgo(ts) {
    const diff = Date.now() - ts;
    const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
    if (m < 1) return 'Just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
}

// ── RENDER ─────────────────────────────────────────────
function renderData() {
    const stream = document.getElementById('live-stream');
    stream.innerHTML = '';
    layerGroup.clearLayers();

    const now = Date.now();
    const filtered = state.allData.filter(f => {
        const [ln, lt] = f.geometry.coordinates;
        if (lt < 5 || lt > 40 || ln < 60 || ln > 110) return false;
        if (f.properties.mag < state.magFilter) return false;
        if (state.currentTab === 'live')
            return (now - f.properties.time) < 86400000;
        return true;
    }).sort((a,b) => b.properties.time - a.properties.time);

    // Alert on new event
    if (state.currentTab === 'live' && filtered.length && state.lastId !== filtered[0].id) {
        if (state.lastId) pushAlert(filtered[0].properties.mag, filtered[0].properties.place);
        state.lastId = filtered[0].id;
    }

    updateStats(filtered);
    updateNearestEq();

    if (!filtered.length) {
        stream.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🌐</div>
                <div class="empty-text">NO EVENTS FOUND</div>
                <div style="font-size:11px;opacity:0.4;margin-top:8px;">Try adjusting the magnitude filter</div>
            </div>`;
        return;
    }

    filtered.forEach((eq, idx) => {
        const [lon, lat, dep] = eq.geometry.coordinates;
        const { mag, place, time } = eq.properties;
        const zones = calcImpact(mag);
        const mc = magClass(mag);
        const depth = dep ? dep.toFixed(0) : '?';
        const feltKm = Math.round(zones.yellow / 1000);

        // Map Markers
        if (state.currentTab === 'live') {
            L.circle([lat,lon], { radius: zones.green,  color: '#20bf6b', weight:1, fillOpacity:0.03 }).addTo(layerGroup);
            L.circle([lat,lon], { radius: zones.yellow, color: '#f7b731', weight:1, fillOpacity:0.07 }).addTo(layerGroup);
            L.circle([lat,lon], { radius: zones.red,    color: mc.color,  weight:1.5, fillOpacity:0.15 }).addTo(layerGroup);
        }

        const markerSize = Math.max(8, Math.min(28, 6 + mag * 3));
        L.circleMarker([lat,lon], {
            radius: markerSize/2 + (state.currentTab === 'past' ? mag : 0),
            color: '#fff', fillColor: mc.color,
            fillOpacity: 0.9, weight: 2
        }).bindTooltip(`<b>${mag.toFixed(1)} ${mc.label}</b><br>${place}<br>Depth: ${depth}km`, { sticky:true })
          .addTo(layerGroup);

        // Card
        const cardDelay = Math.min(idx * 40, 400);
        stream.innerHTML += `
            <div class="event-card" style="animation-delay:${cardDelay}ms"
                onclick="focusEq(${lat},${lon},${mag})">
                <div class="accent-bar"></div>
                <div class="mag-orbit ${mc.cls}">
                    <div class="mag-val">${mag.toFixed(1)}</div>
                    <div class="mag-unit">MAG</div>
                </div>
                <div class="event-info">
                    <div class="event-place">${place}</div>
                    <div class="event-meta">
                        <div class="event-time">🕐 ${timeAgo(time)}</div>
                        <div class="event-depth">📐 ${depth}km deep</div>
                    </div>
                    <div style="margin-top:8px;">
                        <span class="depth-badge">${mc.label}</span>
                    </div>
                    <div class="zone-pills">
                        <div class="zone-pill" style="color:var(--danger)">🔴 ${Math.round(zones.red/1000)}km</div>
                        <div class="zone-pill" style="color:var(--warning)">🟡 ${Math.round(zones.yellow/1000)}km</div>
                        <div class="zone-pill felt" style="color:var(--safe)">🟢 অনুভব: ${feltKm}km</div>
                    </div>
                </div>
            </div>`;
    });
}

function focusEq(lat, lon, mag) {
    const sheet = document.getElementById('sheet');
    sheet.style.transform = 'translateY(80vh)';
    map.flyTo([lat, lon], mag > 5 ? 9 : 8, { duration: 1.2 });
    spikeSeismo(mag);
}

// ── DATA FETCH ─────────────────────────────────────────
async function syncData() {
    try {
        const res  = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_month.geojson");
        const data = await res.json();
        state.allData = data.features;
        renderData();
    } catch(e) {
        console.warn("Stream error:", e);
    }
}

// ── SYNC TIMER ─────────────────────────────────────────
setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft < 0) { state.timeLeft = 10; syncData(); }
    document.getElementById('timer').textContent = `SYNC: ${state.timeLeft}S`;
    document.getElementById('progress').style.width = (100 - state.timeLeft * 10) + '%';
}, 1000);

syncData();

// ── SHEET DRAG ─────────────────────────────────────────
const sheet  = document.getElementById('sheet');
const handle = document.getElementById('handle');
let startY = 0, startPos = 0, isDragging = false;

handle.addEventListener('touchstart', e => {
    isDragging = true;
    startY = e.touches[0].clientY;
    const m = window.getComputedStyle(sheet).transform;
    startPos = m !== 'none' ? parseFloat(m.split(',')[5]) : 0;
    sheet.style.transition = 'none';
}, { passive: true });

handle.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const delta = e.touches[0].clientY - startY;
    let y = Math.max(window.innerHeight * 0.08, startPos + delta);
    sheet.style.transform = `translateY(${y}px)`;
}, { passive: true });

handle.addEventListener('touchend', () => {
    isDragging = false;
    sheet.style.transition = 'transform 0.65s cubic-bezier(0.19, 1, 0.22, 1)';
    const cur = parseFloat(window.getComputedStyle(sheet).transform.split(',')[5]);
    sheet.style.transform = cur < window.innerHeight * 0.45
        ? 'translateY(8vh)' : 'translateY(80vh)';
});

// Click toggle for desktop
handle.addEventListener('click', () => {
    const cur = parseFloat(window.getComputedStyle(sheet).transform.split(',')[5]);
    sheet.style.transform = cur > window.innerHeight * 0.5
        ? 'translateY(8vh)' : 'translateY(80vh)';
});
</script>
</body>
