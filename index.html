<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SENTRY X INFINITY | Abdullah Al Fahim</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --danger: #ff3366; --warning: #ffcc00; --safe: #00ffcc;
            --surface: rgba(15, 23, 42, 0.8); --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12); --glow: rgba(99, 102, 241, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }

        #map { height: 100vh; width: 100%; position: absolute; z-index: 1; filter: contrast(1.2) brightness(0.8) saturate(1.4); }

        /* Cyberpunk Navigation */
        .nav-hub {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 92%;
            z-index: 2000; padding: 14px 24px; border-radius: 24px;
            backdrop-filter: blur(25px); background: var(--surface);
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .os-brand { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 10px var(--glow); }
        
        /* Master Shutter System */
        .shutter {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90vh;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.95), #020617);
            backdrop-filter: blur(30px); border-radius: 45px 45px 0 0; z-index: 1500;
            border-top: 1px solid var(--border); transform: translateY(78vh);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .shutter.active { transform: translateY(10vh); }

        .drag-trigger { width: 100%; padding: 30px 0 10px; display: flex; flex-direction: column; align-items: center; cursor: grab; }
        .drag-bar { width: 60px; height: 4px; background: var(--border); border-radius: 10px; margin-bottom: 8px; }

        .core-content { padding: 0 24px 100px; overflow-y: auto; height: 100%; }

        /* Visual Brilliance: Cards */
        .nexus-card {
            background: var(--glass); border: 1px solid var(--border); padding: 20px;
            border-radius: 30px; margin-bottom: 16px; display: flex; gap: 20px;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .nexus-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .nexus-card:active { transform: scale(0.96); background: rgba(255,255,255,0.06); }

        .mag-core {
            min-width: 70px; height: 70px; border-radius: 22px; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900;
            border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .threat-badge { font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 20px; background: rgba(255,255,255,0.05); text-transform: uppercase; margin-top: 10px; display: inline-flex; align-items: center; gap: 5px; }

        /* Emergency Alert UI */
        .critical-popup {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 90%;
            padding: 24px; border-radius: 32px; z-index: 3000; background: rgba(255, 51, 102, 0.15);
            backdrop-filter: blur(20px); border: 2px solid var(--danger);
            transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .critical-popup.show { top: 30px; box-shadow: 0 0 50px rgba(255, 51, 102, 0.4); }

        .loader-track { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.05); }
        .loader-fill { height: 100%; background: var(--accent); width: 0%; transition: 1s linear; box-shadow: 0 0 15px var(--accent); }

        .dev-signature { text-align: center; margin: 20px 0 40px; }
        .dev-signature h3 { font-size: 10px; letter-spacing: 6px; opacity: 0.4; text-transform: uppercase; margin-bottom: 8px; }
        .dev-signature h2 { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-action { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 24px; font-weight: 800; width: 100%; margin-bottom: 25px; cursor: pointer; font-size: 14px; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="nav-hub">
    <div class="os-brand">SENTRY X ∞</div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="countdown" style="font-family:'Orbitron'; font-size:12px; color:var(--safe);">SYNC: 10S</div>
        <div id="sync-dot" style="width:8px; height:8px; background:var(--safe); border-radius:50%; box-shadow:0 0 10px var(--safe);"></div>
    </div>
</div>

<div class="critical-popup" id="alert-ui">
    <div style="display:flex; align-items:center; gap:20px;">
        <div style="font-size:40px;">🛸</div>
        <div>
            <div style="font-family:'Orbitron'; color:var(--danger); font-size:18px; font-weight:900;">SEISMIC ANOMALY</div>
            <div id="alert-desc" style="font-size:13px; opacity:0.8; margin-top:4px;">Magnitude breach detected in your sector.</div>
        </div>
    </div>
</div>

<div class="shutter" id="shutter">
    <div class="loader-track"><div class="loader-fill" id="sync-progress"></div></div>
    <div class="drag-trigger" id="drag-handle">
        <div class="drag-bar"></div>
    </div>
    
    <div class="core-content">
        <div class="dev-signature">
            <h3>Architected By</h3>
            <h2>ABDULLAH AL FAHIM</h2>
        </div>

        <button onclick="bootSystem()" id="boot-btn" class="btn-action">INITIALIZE QUANTUM SURVEILLANCE</button>

        <div id="data-stream"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([23.8, 90.3], 6);
    let layerGroup = L.layerGroup().addTo(map);
    let lastId = null, timeLeft = 10, audioReady = false;

    // Premium Night Map
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const alertAudio = new Audio('https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg');

    function bootSystem() {
        audioReady = true;
        document.getElementById('boot-btn').style.display = 'none';
        alertAudio.play().then(() => alertAudio.pause());
        if(Notification.permission !== 'granted') Notification.requestPermission();
    }

    // --- Kinetic Touch Engine ---
    const sheet = document.getElementById('shutter');
    const handle = document.getElementById('drag-handle');
    let startY, startTranslate;

    handle.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        const style = window.getComputedStyle(sheet).transform;
        startTranslate = style !== 'none' ? parseInt(style.split(',')[5]) : 0;
        sheet.style.transition = 'none';
    });

    handle.addEventListener('touchmove', (e) => {
        const deltaY = e.touches[0].clientY - startY;
        let move = startTranslate + deltaY;
        if(move < window.innerHeight * 0.1) move = window.innerHeight * 0.1;
        sheet.style.transform = `translateY(${move}px)`;
    });

    handle.addEventListener('touchend', () => {
        sheet.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
        const currentY = parseInt(window.getComputedStyle(sheet).transform.split(',')[5]);
        if(currentY < window.innerHeight * 0.45) {
            sheet.style.transform = 'translateY(10vh)';
            sheet.classList.add('active');
        } else {
            sheet.style.transform = 'translateY(78vh)';
            sheet.classList.remove('active');
        }
    });

    function getImpactZones(mag) {
        const factor = Math.pow(10, (0.5 * mag - 1.25)) * 14000;
        return { r: factor, y: factor * 2.8, g: factor * 6 };
    }

    function launchAlert(mag, place) {
        const ui = document.getElementById('alert-ui');
        document.getElementById('alert-desc').innerText = `Magnitude ${mag} near ${place}`;
        ui.classList.add('show');
        if(audioReady && mag >= 4.5) { alertAudio.currentTime = 0; alertAudio.play(); }
        if(navigator.vibrate) navigator.vibrate([400, 100, 400]);
        setTimeout(() => ui.classList.remove('show'), 7000);
    }

    async function processStream() {
        try {
            const res = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson");
            const data = await res.json();
            const stream = document.getElementById('data-stream');
            stream.innerHTML = ""; layerGroup.clearLayers();

            const events = data.features.filter(f => {
                const [ln, lt] = f.geometry.coordinates;
                return lt > 16 && lt < 31 && ln > 84 && ln < 98;
            }).sort((a,b) => b.properties.time - a.properties.time);

            if(events.length > 0 && lastId !== events[0].id) {
                if(lastId) launchAlert(events[0].properties.mag, events[0].properties.place);
                lastId = events[0].id;
            }

            events.forEach(eq => {
                const [lon, lat] = eq.geometry.coordinates;
                const { mag, place, time } = eq.properties;
                const z = getImpactZones(mag);
                
                L.circle([lat, lon], { radius: z.g, color: 'var(--safe)', weight: 1, fillOpacity: 0.05 }).addTo(layerGroup);
                L.circle([lat, lon], { radius: z.y, color: 'var(--warning)', weight: 1, fillOpacity: 0.1 }).addTo(layerGroup);
                L.circle([lat, lon], { radius: z.r, color: 'var(--danger)', weight: 2, fillOpacity: 0.2 }).addTo(layerGroup);
                L.circleMarker([lat, lon], { radius: 10, color: '#fff', fillColor: 'var(--danger)', fillOpacity: 1, weight: 3 }).addTo(layerGroup);

                stream.innerHTML += `
                    <div class="nexus-card" onclick="map.flyTo([${lat}, ${lon}], 9); sheet.style.transform='translateY(78vh)'">
                        <div class="mag-core" style="color:${mag >= 5 ? 'var(--danger)' : 'var(--accent)'}; border-color:${mag >= 5 ? 'var(--danger)' : 'var(--accent)'}">${mag.toFixed(1)}</div>
                        <div style="flex:1">
                            <div style="font-weight:800; font-size:16px; letter-spacing:-0.5px;">${place}</div>
                            <div style="font-size:11px; opacity:0.5; margin-top:4px;">EVENT LOG: ${new Date(time).toLocaleTimeString()}</div>
                            <div style="display:flex; gap:8px;">
                                <div class="threat-badge" style="color:var(--danger)">🔴 ${Math.round(z.r/1000)}KM</div>
                                <div class="threat-badge" style="color:var(--warning)">🟡 ${Math.round(z.y/1000)}KM</div>
                                <div class="threat-badge" style="color:var(--safe)">🟢 ${Math.round(z.g/1000)}KM</div>
                            </div>
                        </div>
                    </div>`;
            });
        } catch(e) { console.error("Stream Offline"); }
    }

    setInterval(() => {
        timeLeft--;
        if(timeLeft < 0) { timeLeft = 10; processStream(); }
        document.getElementById('countdown').innerText = `SYNC: ${timeLeft}S`;
        document.getElementById('sync-progress').style.width = (100 - (timeLeft * 10)) + '%';
    }, 1000);

    processStream();
</script>
</body>
</html>
