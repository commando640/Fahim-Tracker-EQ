<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SENTRY X ULTRA - Abdullah Al Fahim</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        :root {
            --primary: #6366f1; --danger: #ff4757; --warning: #ffa502; --safe: #2ed573;
            --bg: #0f172a; --glass: rgba(30, 41, 59, 0.75); --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }
        .light-theme {
            --bg: #f1f5f9; --glass: rgba(255, 255, 255, 0.85); --border: rgba(0, 0, 0, 0.08);
            --text: #1e293b;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.4s ease; }
        
        #map { height: 100vh; width: 100%; position: absolute; z-index: 1; filter: saturate(1.1); }

        .glass-panel { backdrop-filter: blur(20px) saturate(180%); background: var(--glass); border: 1px solid var(--border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }

        .header-nav { position: fixed; top: 20px; left: 20px; right: 20px; z-index: 2000; padding: 12px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }

        .shutter { position: fixed; bottom: 0; left: 0; right: 0; height: 88vh; border-radius: 40px 40px 0 0; z-index: 1500; transform: translateY(75vh); transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .drag-area { width: 100%; padding: 25px 0; display: flex; justify-content: center; cursor: grab; }
        .handle { width: 45px; height: 5px; background: var(--primary); border-radius: 10px; opacity: 0.5; }

        .scroll-content { padding: 0 25px 40px; overflow-y: auto; height: calc(100% - 70px); }

        .brand-sec { text-align: center; margin-bottom: 25px; }
        .brand-sec h1 { font-size: 20px; margin: 5px 0; font-weight: 900; background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .eq-card { padding: 20px; border-radius: 25px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); margin-bottom: 15px; display: flex; gap: 15px; }
        .mag-view { min-width: 60px; height: 60px; border-radius: 18px; font-weight: 900; font-size: 20px; display: flex; align-items: center; justify-content: center; background: var(--bg); border: 2px solid var(--primary); color: var(--primary); }

        .zone-badge { font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 8px; margin-right: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .alert-box { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 90%; padding: 22px; border-radius: 30px; z-index: 3000; transition: 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6); border: 2px solid var(--danger); }
        .alert-box.active { top: 30px; }
        
        .neon-loader { position: absolute; top: 0; left: 0; height: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); transition: width 1s linear; }

        .critical-btn { width: 100%; padding: 18px; border-radius: 20px; background: var(--danger); color: white; border: none; font-weight: 900; cursor: pointer; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3); }
    </style>
</head>
<body class="dark-theme">

<div id="map"></div>

<div class="header-nav glass-panel">
    <div style="display: flex; align-items: center; gap: 8px;">
        <span style="height:8px; width:8px; background:var(--safe); border-radius:50%; box-shadow: 0 0 10px var(--safe);"></span>
        <span style="font-size: 11px; font-weight: 800; letter-spacing: 1px;">SENTRY LIVE</span>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <span id="timer-text" style="font-size: 13px; font-weight: 800; color: var(--primary);">10s</span>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:18px; cursor:pointer;">🌓</button>
    </div>
</div>

<div class="alert-box glass-panel" id="main-alert">
    <div style="font-size: 40px; animation: pulse 1s infinite;">🚨</div>
    <div>
        <div style="font-weight: 900; color: var(--danger); font-size: 18px; letter-spacing: 1px;">CRITICAL ALERT</div>
        <div id="alert-text" style="font-size: 13px; opacity: 0.9;">High magnitude activity detected!</div>
    </div>
</div>

<div class="shutter glass-panel" id="shutter">
    <div class="neon-loader" id="neon-bar"></div>
    <div class="drag-area" id="drag-handle">
        <div class="handle"></div>
    </div>
    
    <div class="scroll-content">
        <div class="brand-sec">
            <h2 style="font-size: 9px; letter-spacing: 4px; opacity: 0.5; margin:0;">ENGINEERED BY</h2>
            <h1>ABDULLAH AL FAHIM</h1>
        </div>

        <button onclick="enableAudio()" id="audio-btn" class="critical-btn">🔊 ACTIVATE AUDIO SURVEILLANCE</button>

        <div id="feed"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    let isDark = true, timeLeft = 10, lastId = null, tile, audioEnabled = false;
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([23.8, 90.3], 6);
    let layerGroup = L.layerGroup().addTo(map);

    // Audio System
    const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/emergency_it_is_an_emergency.ogg');
    
    function enableAudio() {
        audioEnabled = true;
        document.getElementById('audio-btn').style.display = 'none';
        // Play silent sound to "unlock" audio on mobile
        alertSound.play().then(() => alertSound.pause());
    }

    function setMapStyle(dark) {
        if (tile) map.removeLayer(tile);
        tile = L.tileLayer(dark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }
    setMapStyle(true);

    function toggleTheme() {
        isDark = !isDark;
        document.body.className = isDark ? 'dark-theme' : 'light-theme';
        setMapStyle(isDark);
    }

    // --- Drag Logic ---
    const sheet = document.getElementById('shutter');
    const handle = document.getElementById('drag-handle');
    let startY, startT;

    handle.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        startT = parseInt(window.getComputedStyle(sheet).transform.split(',')[5]) || 0;
        sheet.style.transition = 'none';
    });

    handle.addEventListener('touchmove', (e) => {
        const delta = e.touches[0].clientY - startY;
        let pos = startT + delta;
        if (pos < window.innerHeight * 0.1) pos = window.innerHeight * 0.1;
        sheet.style.transform = `translateY(${pos}px)`;
    });

    handle.addEventListener('touchend', () => {
        sheet.style.transition = 'transform 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
        const curr = parseInt(window.getComputedStyle(sheet).transform.split(',')[5]);
        sheet.style.transform = curr < window.innerHeight * 0.45 ? 'translateY(12vh)' : 'translateY(75vh)';
    });

    function getRadii(mag) {
        const base = Math.pow(10, (0.5 * mag - 1.25)) * 14000;
        return { red: base, yellow: base * 2.8, green: base * 6 };
    }

    function triggerAlert(mag, place) {
        const al = document.getElementById('main-alert');
        document.getElementById('alert-text').innerText = `${mag} Mag - ${place}`;
        al.classList.add('active');
        
        if (audioEnabled) {
            alertSound.currentTime = 0;
            alertSound.play();
        }
        
        if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
        setTimeout(() => al.classList.remove('active'), 8000);
    }

    async function fetchData() {
        try {
            const r = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson");
            const d = await r.json();
            const feed = document.getElementById('feed');
            feed.innerHTML = ""; layerGroup.clearLayers();

            const filtered = d.features.filter(f => {
                const [ln, lt] = f.geometry.coordinates;
                return lt > 16 && lt < 32 && ln > 84 && ln < 98;
            }).sort((a,b) => b.properties.time - a.properties.time);

            if (filtered.length > 0 && lastId !== filtered[0].id) {
                if (lastId !== null && filtered[0].properties.mag >= 4.0) {
                    triggerAlert(filtered[0].properties.mag, filtered[0].properties.place);
                }
                lastId = filtered[0].id;
            }

            filtered.forEach(eq => {
                const [lon, lat] = eq.geometry.coordinates;
                const { mag, place, time } = eq.properties;
                const r = getRadii(mag);
                const isMajor = mag >= 5.0;

                L.circle([lat, lon], { radius: r.green, color: 'var(--safe)', weight: 1, fillOpacity: 0.05 }).addTo(layerGroup);
                L.circle([lat, lon], { radius: r.yellow, color: 'var(--warning)', weight: 1, fillOpacity: 0.1 }).addTo(layerGroup);
                L.circle([lat, lon], { radius: r.red, color: 'var(--danger)', weight: 1.5, fillOpacity: 0.2 }).addTo(layerGroup);
                L.circleMarker([lat, lon], { radius: isMajor ? 12 : 8, color: '#fff', fillColor: 'var(--danger)', fillOpacity: 1, weight: 3 }).addTo(layerGroup);

                feed.innerHTML += `
                    <div class="eq-card" onclick="map.flyTo([${lat}, ${lon}], 9); sheet.style.transform='translateY(75vh)'">
                        <div class="mag-view" style="${isMajor ? 'border-color:var(--danger); color:var(--danger); box-shadow:0 0 15px var(--danger);' : ''}">${mag.toFixed(1)}</div>
                        <div style="flex:1">
                            <div style="font-weight:900; font-size:15px;">${place}</div>
                            <div style="font-size:11px; opacity:0.6; margin-top:2px;">${new Date(time).toLocaleTimeString()}</div>
                            <div style="display:flex; flex-wrap:wrap;">
                                <span class="zone-badge" style="color:var(--danger)">🔴 বিপদ: ${Math.round(r.red/1000)}km</span>
                                <span class="zone-badge" style="color:var(--warning)">🟡 সতর্ক: ${Math.round(r.yellow/1000)}km</span>
                                <span class="zone-badge" style="color:var(--safe)">🟢 মৃদু: ${Math.round(r.green/1000)}km</span>
                            </div>
                        </div>
                    </div>`;
            });
        } catch(e) { console.log(e); }
    }

    setInterval(() => {
        timeLeft--;
        if(timeLeft < 0) { timeLeft = 10; fetchData(); }
        document.getElementById('timer-text').innerText = timeLeft + 's';
        document.getElementById('neon-bar').style.width = (timeLeft * 10) + '%';
    }, 1000);

    fetchData();
</script>
</body>
</html>
